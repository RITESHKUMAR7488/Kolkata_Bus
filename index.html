        <p>
          Kolkata Travel Router is a free online tool to help you plan your journey across
          Kolkata using public transport. Search bus routes, explore the Kolkata Metro network,
          and browse local train lines — all on one interactive map.
        </p>
        <h2>Features</h2>
        <ul>
          <li>Bus route finder – search hundreds of CSTC and WBTC bus routes across Kolkata</li>
          <li>Kolkata Metro map – view all metro lines and stations including East-West Metro</li>

          <li>Interactive Leaflet map – schematic and geographic views</li>
          <li>Free to use, no sign-up required</li>
        </ul>
        <h2>How to Use</h2>
        <p>
          Enter your starting point and destination in the search panel to find matching bus
          routes. Switch tabs to explore the Kolkata Metro or local train maps.
          JavaScript must be enabled to use the interactive route planner.
        </p>
        <h2>About Kolkata Public Transport</h2>
        <p>
          Kolkata is served by an extensive network of buses (CSTC, WBTC, and private mini-buses),
          the Kolkata Metro (one of India's oldest metro systems), and a dense suburban rail
          network operated by Eastern Railway and South Eastern Railway.
          Kolkata Travel Router makes it easy to navigate this network.
