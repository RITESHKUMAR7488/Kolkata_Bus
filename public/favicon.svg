<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64" width="64" height="64">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#FF6B35;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#FF8C42;stop-opacity:1" />
    </linearGradient>
  </defs>
  <!-- Background rounded square -->
  <rect width="64" height="64" rx="14" fill="url(#bg)" />
  <!-- Route line -->
  <line x1="14" y1="32" x2="50" y2="32" stroke="white" stroke-width="3" stroke-linecap="round" />
  <!-- Start point -->
  <circle cx="14" cy="32" r="5" fill="white" />
  <!-- End point -->
  <circle cx="50" cy="32" r="5" fill="white" />
  <!-- Midpoint dot (transfer) -->
  <circle cx="32" cy="32" r="3.5" fill="#FF6B35" stroke="white" stroke-width="2" />
  <!-- Arrow head at end -->
  <polyline points="44,26 50,32 44,38" fill="none" stroke="white" stroke-width="3" stroke-linecap="round" stroke-linejoin="round" />
  <!-- Top label line (suggests a route number badge) -->
  <rect x="22" y="12" width="20" height="10" rx="5" fill="white" opacity="0.9" />
  <text x="32" y="20.5" text-anchor="middle" font-family="Inter,sans-serif" font-size="7" font-weight="700" fill="#FF6B35">BUS</text>
</svg>
